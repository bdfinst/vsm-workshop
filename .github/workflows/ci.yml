name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  e2e:
    runs-on: ubuntu-latest
    # Run inside the pinned Playwright image so browsers are preinstalled and,
    # crucially, font/rendering matches the committed visual baselines. Keep
    # this version in sync with the @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: E2E + visual regression tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
